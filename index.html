<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KassQu</title>
    
    <link rel="icon" type="image/png" href="logo KassQu.png" />

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <style>
        /* Apple/iOS Dark Mode Fix untuk Input Tanggal */
        input[type="date"] {
            color: #1f2937 !important;
            -webkit-text-fill-color: #1f2937 !important;
            color-scheme: light !important;
        }
        /* Tembak langsung ke shadow DOM kalender Apple */
        input[type="date"]::-webkit-datetime-edit,
        input[type="date"]::-webkit-datetime-edit-text, 
        input[type="date"]::-webkit-datetime-edit-month-field, 
        input[type="date"]::-webkit-datetime-edit-day-field, 
        input[type="date"]::-webkit-datetime-edit-year-field {
            color: #1f2937 !important;

    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 🔴 KONFIGURASI PENTING DEVELOPER 🔴
        // ==========================================
        const DEV_COMPANY_LOGO = ""; 
        const SPLASH_BG_IMAGE = "https://static.vecteezy.com/system/resources/thumbnails/038/813/435/small/ai-generated-beautifulgraphy-for-laundry-advertising-free-photo.jpeg"; 
        const LOGIN_BG_IMAGE = "https://images.rawpixel.com/image_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTAzL2FuZ3VzdGVvd19waG90b19vZl9jbG90aGVzX3dhc2hpbmdfbWFjaGluZV9pbl9taW5pbWFsX2xhdW5kcnlfYl8wYTg4MjY5ZC04NTRhLTQ5ODUtYTQ4ZC1lNGUzZDdmYzMyMDJfMS5qcGc.jpg"; 

        // PASTE URL WEB APP GOOGLE APPS SCRIPT LU DI SINI:
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxR1PppWpHWrvku-14G-vfYUAvTy13S8N69iZfjNfAhZKs2SHU3d6uQNjEJKm7aWlI/exec"; 
        // ==========================================

        // --- UTUTLITAS FORMATTER UNTUK INPUT ---
        const formatThousand = (val) => {
            if (val === undefined || val === null || val === '') return '';
            const num = val.toString().replace(/[^0-9]/g, '');
            return num ? new Intl.NumberFormat('id-ID').format(num) : '';
        };

        const parseThousand = (val) => {
            if (!val) return 0;
            return Number(val.toString().replace(/[^0-9]/g, ''));
        };

        // --- SISTEM ICON INTERNAL ---
        const icons = {
            Home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>,
            Package: <><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,
            ShoppingCart: <><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></>,
            FileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
            Settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
            Search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
            Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
            Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
            Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
            ImageIcon: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
            LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
            Printer: <><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></>,
            CheckCircle2: <><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></>,
            Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
            CalendarDays: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>,
            XCircle: <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>,
            Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
            MessageCircle: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>,
            Bluetooth: <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>,
            Wallet: <><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></>,
            Receipt: <><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/></>,
            UserCircle: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></>
        };

        const Icon = ({ name, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {icons[name] || icons.Package}
            </svg>
        );

        // --- DATA DEFAULT ---
        const INITIAL_SETTINGS = {
            storeName: 'Toko Lek Heru',
            address: 'Jl. Merdeka No. 123',
            phone: '0812-3456-7890',
            logo: null,
            receiptFooter: '*** TERIMA KASIH ***',
            modalLaci: 0
        };

        const INITIAL_PRODUCTS = [
            { id: 1, name: 'Cuci Komplit (Cuci + Setrika)', price: 7000, costPrice: 4000, unit: 'Kg', image: null, category: 'Kiloan' },
            { id: 2, name: 'Cuci Kering', price: 5000, costPrice: 3000, unit: 'Kg', image: null, category: 'Kiloan' }
        ];

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; const MAX_HEIGHT = 600;
                        let width = img.width; let height = img.height;
                        if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
                        else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                };
            });
        };

        // --- KOMPONEN UTAMA ---
        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [isDbLoading, setIsDbLoading] = useState(false);
            
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('kassqu_user') !== null);
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('kassqu_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [activeTab, setActiveTab] = useState(() => localStorage.getItem('kassqu_tab') || 'dashboard');
            
            const [searchQuery, setSearchQuery] = useState('');
            const [settings, setSettings] = useState(INITIAL_SETTINGS);
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [transactions, setTransactions] = useState([]);
            
            const [loginError, setLoginError] = useState('');
            const [editingTrx, setEditingTrx] = useState(null);

            useEffect(() => {
                localStorage.setItem('kassqu_tab', activeTab);
            }, [activeTab]);

            const fetchFromGAS = async (payload) => {
                try {
                    if (!GAS_URL.startsWith('http')) {
                        console.warn("Harap masukkan GAS_URL yang valid.");
                        return { status: 'error', message: 'GAS_URL belum dikonfigurasi dengan tautan Apps Script.' };
                    }
                    
                    const response = await fetch(GAS_URL, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify(payload) 
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    console.error("GAS Error:", error);
                    return { status: 'error', message: 'Gagal koneksi ke server database.' };
                }
            };

            useEffect(() => {
                let isMounted = true;
                const loadInitialData = async () => {
                    try {
                        const res = await fetchFromGAS({ action: 'GET_DATA' });
                        if (isMounted && res.status === 'success') {
                            if (res.data.settings && Object.keys(res.data.settings).length > 0) {
                                setSettings({ ...INITIAL_SETTINGS, ...res.data.settings });
                            }
                            if (res.data.products && Array.isArray(res.data.products) && res.data.products.length > 0) {
                                setProducts(res.data.products);
                            }
                            if (res.data.transactions && Array.isArray(res.data.transactions)) {
                                setTransactions(res.data.transactions);
                            }
                        }
                    } catch (e) {
                        console.error("Gagal memuat data awal:", e);
                    }
                };

                Promise.all([
                    loadInitialData(),
                    new Promise(resolve => setTimeout(resolve, 2000))
                ]).then(() => {
                    if (isMounted) setShowSplash(false);
                });

                return () => { isMounted = false; };
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                const inputUser = e.target.username.value;
                const inputPass = e.target.password.value;
                
                setLoginError('Mengecek kredensial ke server...');
                setIsDbLoading(true);
                const res = await fetchFromGAS({ action: 'GET_DATA' });
                setIsDbLoading(false);

                if (res.status === 'success') {
                    const staffData = res.data.staff || [];
                    
                    let validUser = staffData.find(s => {
                        const dbUser = String(s.kodeKasir || s['Kode Kasir'] || '').trim();
                        const dbPin = String(s.pin || s['PIN'] || s.PIN || '').trim();
                        const dbStatus = String(s.status || s['Status'] || s.Status || '').trim().toLowerCase();
                        
                        return dbUser === inputUser && dbPin === inputPass && dbStatus === 'aktif';
                    });

                    if (!validUser && inputUser === 'admin' && inputPass === '123') {
                        validUser = { kodeKasir: 'admin', namaKasir: 'Admin Utama', status: 'aktif' };
                    }

                    if (validUser) {
                        setCurrentUser(validUser);
                        localStorage.setItem('kassqu_user', JSON.stringify(validUser));
                        
                        if (res.data.settings && Object.keys(res.data.settings).length > 0) {
                            setSettings({ ...INITIAL_SETTINGS, ...res.data.settings });
                        }
                        if (res.data.products && Array.isArray(res.data.products) && res.data.products.length > 0) {
                            setProducts(res.data.products);
                        }
                        if (res.data.transactions && Array.isArray(res.data.transactions)) {
                            setTransactions(res.data.transactions);
                        }
                        setIsLoggedIn(true); 
                        setLoginError('');
                    } else {
                        setLoginError('Kode Kasir/PIN salah, atau akun nonaktif!');
                    }
                } else {
                    setLoginError(res.message || 'Gagal koneksi ke server database.');
                }
            };

            const updateSettingsDb = async (newData) => { 
                setSettings(newData); 
                await fetchFromGAS({ action: 'SAVE_SETTINGS', data: newData }); 
            };

            const saveProductDb = async (prod) => {
                const newProds = products.find(p => p.id === prod.id) ? products.map(p => p.id === prod.id ? prod : p) : [...products, prod];
                setProducts(newProds); 
                await fetchFromGAS({ action: 'SAVE_PRODUCT', data: prod }); 
            };

            const deleteProductDb = async (id) => { 
                setProducts(products.filter(p => p.id !== id)); 
                await fetchFromGAS({ action: 'DELETE_PRODUCT', id: id }); 
            };

            const saveTransactionDb = async (trx) => {
                const newTrxs = transactions.find(t => t.id === trx.id) ? transactions.map(t => t.id === trx.id ? trx : t) : [...transactions, trx];
                setTransactions(newTrxs); 
                await fetchFromGAS({ action: 'SAVE_TRANSACTION', data: trx }); 
            };

            const deleteTransactionDb = async (id) => { 
                setTransactions(transactions.filter(t => t.id !== id)); 
                await fetchFromGAS({ action: 'DELETE_TRANSACTION', id: id }); 
            };

            const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

            if (showSplash) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col items-center justify-center text-white" style={{ backgroundImage: `url('${SPLASH_BG_IMAGE}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                        <div className="absolute inset-0 bg-gray-900/50 backdrop-blur-[4px]"></div>
                        <div className="relative z-10 flex flex-col items-center animate-in fade-in duration-700">
                            <div className="w-16 h-16 rounded-full animate-spin border-[4px] border-white border-t-[#5c5cff] border-l-[#5c5cff] mb-8 drop-shadow-md"></div>
                            <div className="flex items-center gap-3 animate-fade-in">
                                <div className="w-16 h-16 flex items-center justify-center shrink-0 drop-shadow-xl">
                                    <img src="logo KassQu.png" alt="Logo" className="w-full h-full object-contain rounded-[1.1rem]" />
                                </div>
                                <h1 className="text-4xl font-black tracking-widest drop-shadow-md" style={{ fontFamily: 'Tahoma, sans-serif' }}>KASSQU</h1>
                            </div>
                            <p className="text-sm opacity-80 mt-4">Menyiapkan toko Anda...</p>
                        </div>
                    </div>
                );
            }

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex flex-col justify-center items-center p-4 font-sans relative" style={{ backgroundImage: `url('${LOGIN_BG_IMAGE}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
                        <div className="absolute inset-0 bg-gradient-to-b from-gray-900/20 to-gray-900/50 backdrop-blur-[2px]"></div>
                        <div className="relative z-10 bg-white/20 backdrop-blur-[2px] p-8 rounded-3xl shadow-2xl w-full max-w-md border border-white/30">
                            <div className="text-center mb-6 flex flex-col items-center">
                                {settings?.logo ? (
                                    <img src={settings.logo} alt="Logo Toko" className="w-20 h-20 object-cover rounded-2xl mb-4 shadow-lg border-2 border-white/20" />
                                ) : (
                                    <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl flex items-center justify-center font-bold text-4xl mb-4 shadow-lg border-2 border-white/20">
                                        {(settings?.storeName || 'S').charAt(0).toUpperCase()}
                                    </div>
                                )}
                                <h1 className="text-2xl font-black text-white tracking-wide uppercase drop-shadow-md leading-tight">{settings?.storeName || 'SISTEM KASIR'}</h1>
                                <p className="text-gray-200 text-sm mt-2 font-medium">Masuk untuk melanjutkan</p>
                            </div>
                            {loginError && <div className="mb-4 p-3 bg-red-100/90 text-red-700 rounded-lg text-sm font-bold flex justify-center text-center gap-2 border border-red-200"><Icon name="XCircle" size={16} className="shrink-0 mt-0.5" /> <span>{loginError}</span></div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="text" name="username" placeholder="Kode Kasir (Contoh: admin)" required className="w-full px-4 py-3 rounded-xl border border-white/50 focus:ring-2 focus:ring-blue-400 outline-none bg-white/90 text-gray-800" />
                                <input type="password" name="password" placeholder="PIN Kasir" required className="w-full px-4 py-3 rounded-xl border border-white/50 focus:ring-2 focus:ring-blue-400 outline-none bg-white/90 text-gray-800" />
                                <button type="submit" disabled={isDbLoading} className="w-full bg-gradient-to-r from-blue-600 to-blue-700 disabled:opacity-70 text-white font-bold py-3 rounded-xl shadow-lg border border-blue-500">{isDbLoading ? 'Memproses...' : 'Masuk Aplikasi'}</button>
                                <div className="pt-3 text-center"><p className="text-xs text-white/50 font-medium">Hubungi Pemilik/Owner jika Anda lupa PIN.</p></div>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans pb-20 print:pb-0 print:bg-white">
                    <header className="bg-white shadow-sm sticky top-0 z-20 print:hidden">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                {settings?.logo ? <img src={settings.logo} alt="Logo" className="w-10 h-10 object-cover rounded-full border border-gray-200" /> : <div className="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold">{(settings?.storeName || 'K').charAt(0).toUpperCase()}</div>}
                                <div><h1 className="font-bold text-gray-800 text-sm sm:text-lg leading-tight">{settings?.storeName || 'Toko Kasir'}</h1><p className="text-[10px] text-gray-500 font-medium flex items-center gap-1"><Icon name="UserCircle" size={12}/> Kasir: {currentUser?.namaKasir || 'Staff'}</p></div>
                            </div>
                            <div className="hidden sm:flex flex-1 max-w-md mx-4 relative">
                                <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" size={20} />
                                <input type="text" placeholder="Cari transaksi, produk..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-full focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm"/>
                            </div>
                            <button onClick={() => { 
                                setIsLoggedIn(false); setCurrentUser(null); localStorage.removeItem('kassqu_user'); localStorage.removeItem('kassqu_tab'); setActiveTab('dashboard'); 
                            }} className="text-gray-500 hover:text-red-500 transition-colors p-2 flex items-center gap-1 text-sm font-medium">
                                <Icon name="LogOut" size={20} /> <span className="hidden sm:inline">Keluar</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full p-4 print:p-0">
                        {activeTab === 'dashboard' && <DashboardView transactions={transactions} formatRupiah={formatRupiah} settings={settings} onSaveSettings={updateSettingsDb} />}
                        {activeTab === 'produk' && <ProdukView products={products} onSaveProduct={saveProductDb} onDeleteProduct={deleteProductDb} formatRupiah={formatRupiah} searchQuery={searchQuery} compressImage={compressImage} />}
                        {activeTab === 'kasir' && <KasirView products={products} transactions={transactions} onSaveTransaction={saveTransactionDb} formatRupiah={formatRupiah} searchQuery={searchQuery} settings={settings} editingTrx={editingTrx} clearEditingTrx={() => setEditingTrx(null)} />}

            const openModal = (product = null) => {
                if (product) {

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4">

                                <div className="p-2 sm:p-3 flex-1 flex flex-col justify-between"><div><h3 className="font-bold text-gray-800 text-xs sm:text-sm mb-1 leading-tight line-clamp-2">{p.name}</h3><p className="text-blue-600 font-semibold text-xs">{formatRupiah(p.price)} <span className="text-gray-500 text-[10px] font-normal">/ {p.unit}</span></p></div><div className="flex gap-1.5 mt-2 pt-2 border-t border-gray-100"><button onClick={() => openModal(p)} className="flex-1 bg-gray-50 hover:bg-gray-200 text-gray-700 py-1.5 rounded-lg flex items-center justify-center gap-1 text-[10px] font-medium"><Icon name="Edit" size={12} /> Edit</button><button onClick={() => onDeleteProduct(p.id)} className="bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1.5 rounded-lg flex items-center justify-center"><Icon name="Trash2" size={12} /></button></div></div>
                            </div>

                    {isModalOpen && (

                                <div className="p-6 border-b border-gray-100"><h3 className="text-xl font-bold text-gray-800">{editingProduct ? 'Edit Layanan' : 'Tambah Layanan Baru'}</h3></div>
                                <form onSubmit={saveProduct} className="p-6 space-y-4">
                                    <div><label className="block text-sm font-medium mb-1">Nama Layanan</label><input type="text" required value={name} onChange={e=>setName(e.target.value)} className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                    <div className="grid grid-cols-2 gap-4">

                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium mb-1">Satuan</label><select value={unit} onChange={e=>setUnit(e.target.value)} className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"><option value="Kg">Kg</option><option value="Pcs">Pcs</option><option value="Psg">Pasang</option><option value="Meter">Meter</option></select></div>

        function PaymentModal({ totalCart, onConfirm, onClose, formatRupiah, formatThousand, parseThousand }) {
            const [method, setMethod] = useState('Cash');
            const [received, setReceived] = useState('');
            
            const numReceived = parseThousand(received);
            const change = numReceived > totalCart ? numReceived - totalCart : 0;

            const handleQuickAmount = (amount) => {
                if (amount === 'pas') setReceived(formatThousand(totalCart));
                else setReceived(formatThousand(amount));
            };

            const handleSubmit = () => {
                if (method === 'Cash' && numReceived < totalCart) {
                    alert('Uang yang diterima kurang dari total tagihan!');
                    return;
                }
                const finalReceived = method === 'Cash' ? numReceived : totalCart;
                const finalChange = method === 'Cash' ? change : 0;
                onConfirm(method, finalReceived, finalChange);
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 animate-in fade-in">
                    <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0">
                        <div className="p-5 border-b relative text-center">
                            <h2 className="text-xl font-bold text-gray-800">Pembayaran</h2>
                            <button onClick={onClose} className="absolute right-4 top-1/2 -translate-y-1/2 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200"><Icon name="XCircle" size={18}/></button>
                        </div>
                        <div className="p-6 space-y-6">
                            <div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 text-center">
                                <p className="text-blue-600 font-bold text-sm tracking-wide mb-1 uppercase">Total Harus Dibayar</p>
                                <p className="text-4xl font-black text-blue-700">{formatRupiah(totalCart)}</p>
                            </div>
                            <div className="flex gap-2">
                                {['Cash', 'QRIS', 'Transfer'].map(m => (
                                    <button key={m} onClick={()=>{setMethod(m); setReceived('');}} className={`flex-1 py-3 rounded-xl font-bold border-2 transition-all ${method === m ? 'border-blue-600 bg-blue-600 text-white shadow-md shadow-blue-200' : 'border-gray-200 bg-white text-gray-500 hover:border-blue-300'}`}>{m}</button>
                                ))}
                            </div>
                            {method === 'Cash' && (
                                <div className="space-y-4 animate-in fade-in">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Uang Diterima (Rp)</label>
                                        <input type="text" value={received} onChange={(e) => setReceived(formatThousand(e.target.value))} placeholder="0" className="w-full text-right text-2xl font-bold px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" />
                                    </div>
                                    <div className="grid grid-cols-4 gap-2">
                                        <button onClick={() => handleQuickAmount('pas')} className="py-2 bg-gray-800 text-white rounded-lg font-bold text-xs shadow-sm hover:bg-gray-700">PAS</button>
                                        <button onClick={() => handleQuickAmount(20000)} className="py-2 bg-gray-100 text-gray-700 border rounded-lg font-bold text-xs hover:bg-gray-200">20K</button>
                                        <button onClick={() => handleQuickAmount(50000)} className="py-2 bg-gray-100 text-gray-700 border rounded-lg font-bold text-xs hover:bg-gray-200">50K</button>
                                        <button onClick={() => handleQuickAmount(100000)} className="py-2 bg-gray-100 text-gray-700 border rounded-lg font-bold text-xs hover:bg-gray-200">100K</button>
                                    </div>
                                    <div className={`p-4 rounded-xl flex justify-between items-center font-bold border ${change > 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-gray-50 border-gray-200 text-gray-500'}`}>
                                        <span>Kembalian:</span><span className="text-xl">{formatRupiah(change)}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="p-4 bg-gray-50 border-t">
                            <button onClick={handleSubmit} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-colors">
                                <Icon name="Receipt" size={24} /> PROSES TRANSAKSI
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function KasirView({ products, transactions, onSaveTransaction, formatRupiah, searchQuery, settings, editingTrx, clearEditingTrx }) {
            const [cart, setCart] = useState([]);
            const [customerName, setCustomerName] = useState(''); const [customerPhone, setCustomerPhone] = useState(''); const [pickupDate, setPickupDate] = useState(new Date(Date.now() + 86400000 * 2).toISOString().split('T')[0]);
            const [trxId, setTrxId] = useState(null); 
            const [receiptData, setReceiptData] = useState(null);
            const [showPaymentModal, setShowPaymentModal] = useState(false);
            const [isCartMobileOpen, setIsCartMobileOpen] = useState(false); 

            useEffect(() => { if (editingTrx) { setCart(editingTrx.items || []); setCustomerName(editingTrx.customer || ''); setCustomerPhone(editingTrx.customerPhone || ''); setPickupDate(editingTrx.pickupDate || ''); setTrxId(editingTrx.id); } }, [editingTrx]);

            const cancelEdit = () => { setCart([]); setCustomerName(''); setCustomerPhone(''); setPickupDate(new Date(Date.now() + 86400000 * 2).toISOString().split('T')[0]); setTrxId(null); clearEditingTrx(); setIsCartMobileOpen(false); };
            const filteredProducts = products.filter(p => (p.name || '').toLowerCase().includes(searchQuery.toLowerCase()));
            const addToCart = (product) => { setCart(cart.find(i => i.id === product.id) ? cart.map(i => i.id === product.id ? { ...i, qty: (parseFloat(i.qty) || 0) + 1 } : i) : [...cart, { ...product, qty: 1 }]); };
            const updateQty = (id, delta) => { setCart(cart.map(i => { if (i.id === id) { const n = (parseFloat(i.qty) || 0) + delta; return n > 0 ? { ...i, qty: n } : null; } return i; }).filter(Boolean)); };
            const handleQtyChange = (id, val) => setCart(cart.map(i => i.id === id ? { ...i, qty: val } : i));
            const removeCartItem = (id) => setCart(cart.filter(i => i.id !== id));
            
            const totalCart = cart.reduce((sum, item) => sum + (item.price * (parseFloat(item.qty) || 0)), 0);
            const totalItemQty = cart.reduce((sum, item) => sum + (parseFloat(item.qty) || 0), 0);

            const handleProcessPayment = (method, amountReceived, change) => {
                const cleanCart = cart.map(i => ({...i, qty: parseFloat(i.qty) || 0})).filter(i => i.qty > 0);
                const todayStr = new Date().toISOString().split('T')[0];
                const todayTrx = transactions.filter(t => t.date && t.date.startsWith(todayStr));
                const queueNumber = trxId && editingTrx && editingTrx.queueNumber ? editingTrx.queueNumber : (todayTrx.length + 1);
                
                const newTrx = { 
                    id: trxId || `TRX-${Date.now().toString().slice(-6)}`, 
                    customer: customerName || 'Pelanggan Baru', 
                    customerPhone: customerPhone, 
                    items: cleanCart, 
                    total: totalCart, 
                    status: 'Lunas', 
                    date: trxId && editingTrx ? editingTrx.date : new Date().toISOString(), 
                    pickupDate: pickupDate,
                    queueNumber: queueNumber,
                    progressStatus: trxId && editingTrx && editingTrx.progressStatus ? editingTrx.progressStatus : 'Baru Masuk',
                    paymentMethod: method,        
                    amountReceived: amountReceived, 
                    change: change                
                };
                
                onSaveTransaction(newTrx); setReceiptData(newTrx); setShowPaymentModal(false); cancelEdit(); setIsCartMobileOpen(false);
            };

            const handleCheckoutTunda = () => {
                if (cart.length === 0) return;
                const cleanCart = cart.map(i => ({...i, qty: parseFloat(i.qty) || 0})).filter(i => i.qty > 0);
                const todayStr = new Date().toISOString().split('T')[0];
                const todayTrx = transactions.filter(t => t.date && t.date.startsWith(todayStr));
                const queueNumber = trxId && editingTrx && editingTrx.queueNumber ? editingTrx.queueNumber : (todayTrx.length + 1);
                
                const newTrx = { 
                    id: trxId || `TRX-${Date.now().toString().slice(-6)}`, 
                    customer: customerName || 'Pelanggan Baru', 
                    customerPhone: customerPhone, 
                    items: cleanCart, 
                    total: totalCart, 
                    status: 'Belum Lunas', 
                    date: trxId && editingTrx ? editingTrx.date : new Date().toISOString(), 
                    pickupDate: pickupDate,
                    queueNumber: queueNumber,
                    progressStatus: trxId && editingTrx && editingTrx.progressStatus ? editingTrx.progressStatus : 'Baru Masuk',
                    paymentMethod: '-', amountReceived: 0, change: 0
                };
                onSaveTransaction(newTrx); setReceiptData(newTrx); cancelEdit(); setIsCartMobileOpen(false);
            };

            return (
                <div className="flex flex-row gap-3 sm:gap-6 animate-in fade-in h-[calc(100vh-140px)] relative overflow-hidden">
                    <div className="flex-1 overflow-y-auto pr-1 pb-24 md:pb-4">
                        <h2 className="text-lg font-bold text-gray-800 mb-4">Pilih Layanan</h2>
                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-2 sm:gap-3">
                            {filteredProducts.map(p => (
                                <button key={p.id} onClick={() => addToCart(p)} className="bg-white rounded-xl border p-2 flex flex-col items-center text-center hover:border-blue-500 group">
                                    <div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mb-2 overflow-hidden">{p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <Icon name="Package" size={24} className="text-blue-500" />}</div>
                                    <h3 className="font-medium text-[10px] sm:text-xs mb-1 line-clamp-2">{p.name}</h3><p className="text-blue-600 font-bold text-[10px] sm:text-xs mb-2">{formatRupiah(p.price)}</p>
                                    <div className="mt-auto w-full py-1 bg-blue-50 text-blue-600 text-[10px] font-bold rounded">+ Tambah</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    {(cart.length > 0 || trxId) && (
                        <div className="md:hidden fixed bottom-16 left-0 right-0 bg-white border-t shadow-[0_-8px_15px_-3px_rgba(0,0,0,0.1)] z-30 p-3 flex justify-between items-center animate-in slide-in-from-bottom-2">
                            <div>
                                <p className="text-[10px] text-gray-500 font-bold uppercase">Total Pesanan</p>
                                <p className="text-lg font-black text-blue-700">{formatRupiah(totalCart)}</p>
                            </div>
                            <button onClick={() => setIsCartMobileOpen(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 transition-transform active:scale-95">
                                <Icon name="ShoppingCart" size={18} />
                                Lihat Keranjang ({totalItemQty})
                            </button>
                        </div>
                    )}

                    <div className={`fixed inset-0 z-40 bg-gray-50 flex flex-col md:static md:z-auto md:bg-white md:w-[340px] md:shadow-lg md:border md:rounded-2xl shrink-0 transition-transform duration-300 ${isCartMobileOpen ? 'translate-y-0' : 'translate-y-full md:translate-y-0'}`}>
                        <div className="p-3 border-b bg-white md:bg-gray-50 md:rounded-t-2xl space-y-2 relative shadow-sm md:shadow-none pt-4 md:pt-3">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setIsCartMobileOpen(false)} className="md:hidden p-1.5 bg-gray-100 rounded-full text-gray-600 hover:bg-gray-200"><Icon name="XCircle" size={20}/></button>
                                    <h2 className="font-bold text-gray-800 text-lg md:text-base">{trxId ? 'Pesanan Diedit' : 'Keranjang Pesanan'}</h2>
                                </div>
                                {trxId && <button onClick={cancelEdit} className="text-red-500 text-xs font-bold"><Icon name="XCircle" size={14} className="inline"/> Batal</button>}
                            </div>
                            <input type="text" placeholder="Nama Pelanggan" value={customerName} onChange={e=>setCustomerName(e.target.value)} className="w-full px-3 py-2 md:px-2 md:py-1.5 text-sm border rounded-lg focus:ring-1 outline-none" />
                            <input type="text" placeholder="No. WA (0812...)" value={customerPhone} onChange={e=>setCustomerPhone(e.target.value)} className="w-full px-3 py-2 md:px-2 md:py-1.5 text-sm border rounded-lg focus:ring-1 outline-none" />
                            <div className="flex items-center gap-2 bg-white px-3 py-2 md:px-2 md:py-1.5 border rounded-lg text-sm"><Icon name="CalendarDays" size={14} className="text-gray-400"/><span className="text-gray-500 text-xs flex-1">Ambil:</span><input type="date" value={pickupDate} onChange={e=>setPickupDate(e.target.value)} className="outline-none text-right font-medium cursor-pointer bg-transparent text-gray-800" /></div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-3 space-y-2 bg-white md:bg-transparent">
                            {cart.length===0 ? <div className="h-full flex flex-col items-center justify-center text-gray-400 text-sm"><Icon name="ShoppingCart" size={32} className="mb-2 opacity-50"/>Keranjang Kosong</div> : 
                            cart.map(i => (
                                <div key={i.id} className="bg-white md:bg-gray-50 p-3 md:p-2 rounded-xl border shadow-sm md:shadow-none"><div className="flex justify-between items-start mb-2"><div className="flex-1"><h4 className="text-xs font-bold leading-tight">{i.name}</h4><p className="text-[10px] text-gray-500">{formatRupiah(i.price)}/{i.unit}</p></div><button onClick={()=>removeCartItem(i.id)} className="text-red-400 p-1"><Icon name="Trash2" size={14}/></button></div><div className="flex justify-between items-center"><div className="flex bg-white border rounded"><button onClick={()=>updateQty(i.id, -1)} className="px-3 md:px-2 py-1 md:py-0 bg-gray-100">-</button><input type="number" value={i.qty} onChange={e=>handleQtyChange(i.id, e.target.value)} className="w-12 md:w-10 text-center text-xs font-bold border-x outline-none"/><button onClick={()=>updateQty(i.id, 1)} className="px-3 md:px-2 py-1 md:py-0 bg-gray-100">+</button></div><p className="text-sm md:text-xs font-bold">{formatRupiah(i.price*(parseFloat(i.qty)||0))}</p></div></div>
                            ))}
                        </div>
                        <div className="p-3 border-t bg-white md:rounded-b-2xl shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] md:shadow-none">
                            <div className="flex justify-between items-center mb-3"><span className="text-sm font-medium">Total Tagihan</span><span className="text-xl font-bold">{formatRupiah(totalCart)}</span></div>
                            <div className="grid grid-cols-2 gap-2"><button onClick={handleCheckoutTunda} disabled={cart.length===0} className="py-3 md:py-2 bg-orange-100 text-orange-700 font-semibold rounded-xl text-xs flex flex-col items-center"><Icon name="Clock" size={16}/>Simpan (Tunda)</button><button onClick={()=>setShowPaymentModal(true)} disabled={cart.length===0} className="py-3 md:py-2 bg-blue-600 text-white font-semibold rounded-xl text-xs flex flex-col items-center shadow-lg"><Icon name="CheckCircle2" size={16}/>Bayar Lunas</button></div>
                        </div>
                    </div>
                    {showPaymentModal && <PaymentModal totalCart={totalCart} onConfirm={handleProcessPayment} onClose={()=>setShowPaymentModal(false)} formatRupiah={formatRupiah} formatThousand={formatThousand} parseThousand={parseThousand} />}
                    {receiptData && <ReceiptModal data={receiptData} settings={settings} onClose={()=>setReceiptData(null)} formatRupiah={formatRupiah} />}
                </div>
            );
        }

        function LaporanView({ transactions, onDeleteTransaction, onUpdateTransaction, formatRupiah, searchQuery, onLoadToKasir, settings }) {
            const [startDate, setStartDate] = useState(''); const [endDate, setEndDate] = useState('');
            const filteredTrx = transactions.filter(t => {
                const matchSearch = (t.id || '').toLowerCase().includes(searchQuery.toLowerCase()) || (t.customer || '').toLowerCase().includes(searchQuery.toLowerCase());
                if (!matchSearch) return false;
                const d = t.date ? new Date(t.date) : new Date(); 
                if (startDate && d < new Date(startDate)) return false; 
                if (endDate && d > new Date(endDate+"T23:59:59")) return false;
                return true;
            }).sort((a,b) => new Date(b.date || Date.now()) - new Date(a.date || Date.now()));
            
            const lunasTrx = filteredTrx.filter(t => t.status === 'Lunas');
            const totalOmset = lunasTrx.reduce((s, t) => s + (t.total || 0), 0);
            
            const totalModal = lunasTrx.reduce((sumTrx, t) => {
                const itemModalSum = (t.items || []).reduce((sumItem, item) => sumItem + ((item.costPrice || 0) * (item.qty || 0)), 0);
                return sumTrx + itemModalSum;
            }, 0);
            
            const labaBersih = totalOmset - totalModal;

            return (
                <div className="space-y-4 animate-in fade-in">
                    <div className="flex justify-between items-center print:hidden"><h2 className="text-xl font-bold text-gray-800">Laporan Keuangan</h2><button onClick={()=>window.print()} className="bg-green-600 text-white px-3 py-1.5 rounded flex items-center gap-1 text-sm"><Icon name="Download" size={14}/> Cetak PDF</button></div>
                    <div className="bg-white p-3 rounded-lg shadow-sm border flex gap-3 print:hidden text-sm"><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="border rounded px-2 py-1 outline-none text-gray-800" /><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border rounded px-2 py-1 outline-none text-gray-800" />{(startDate||endDate)&&<button onClick={()=>{setStartDate('');setEndDate('');}} className="text-xs text-red-500 hover:underline">Reset</button>}</div>
                    
                    <div className="grid grid-cols-3 gap-3 print:hidden mb-4">
                        <div className="bg-white border rounded-xl p-3 shadow-sm text-center">
                            <p className="text-[10px] text-gray-500 font-bold uppercase mb-1">Total Omset</p>
                            <p className="text-lg font-black text-blue-600">{formatRupiah(totalOmset)}</p>
                        </div>
                        <div className="bg-orange-50 border border-orange-100 rounded-xl p-3 shadow-sm text-center">
                            <p className="text-[10px] text-orange-500 font-bold uppercase mb-1">Total Modal</p>
                            <p className="text-lg font-black text-orange-600">{formatRupiah(totalModal)}</p>
                        </div>
                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 shadow-sm text-center">
                            <p className="text-[10px] text-emerald-600 font-bold uppercase mb-1">Laba Bersih</p>
                            <p className="text-lg font-black text-emerald-600">{formatRupiah(labaBersih)}</p>
                        </div>
                    </div>

                    <div className="hidden print:block text-center border-b-2 pb-2 mb-4"><h1 className="text-xl font-bold">{settings?.storeName || 'Toko'}</h1><p className="text-xs text-gray-600">Laporan Transaksi</p></div>
                    <div className="bg-white rounded-lg border overflow-x-auto"><table className="w-full text-left text-sm print:text-xs"><thead><tr className="bg-gray-50 border-b"><th className="p-3">Pelanggan & Antrian</th><th className="p-3">Tanggal</th><th className="p-3">Item</th><th className="p-3 text-right">Total</th><th className="p-3 text-center">Pembayaran</th><th className="p-3 text-center print:hidden">Proses</th><th className="p-3 print:hidden">Aksi</th></tr></thead><tbody className="divide-y">
                        {filteredTrx.map(t => (
                        <tr key={t.id} className="hover:bg-gray-50">
                            <td className="p-3">
                                <p className="font-bold">{t.customer || 'Pelanggan'}</p>
                                <p className="text-[10px] text-gray-400">{t.id}</p>
                                <span className="inline-block mt-1 bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded font-bold">Antrian {t.queueNumber || '-'}</span>
                            </td>
                            <td className="p-3 whitespace-nowrap">
                                <p className="text-xs"><span className="text-gray-400">M:</span> {t.date ? new Date(t.date).toLocaleDateString('id-ID') : '-'}</p>
                                <p className="text-xs font-bold text-red-500"><span className="text-gray-400 font-normal">A:</span> {t.pickupDate ? new Date(t.pickupDate).toLocaleDateString('id-ID') : '-'}</p>
                            </td>
                            <td className="p-3 text-gray-500 text-xs">{(t.items || []).map(i=>`${i.qty}${i.unit} ${i.name}`).join(', ')}</td>
                            <td className="p-3 text-right font-bold">{formatRupiah(t.total || 0)}</td>
                            <td className="p-3 text-center">
                                <div className={`inline-flex flex-col items-center px-2 py-1 rounded text-[10px] font-bold ${t.status==='Lunas'?'bg-green-100 text-green-700':'bg-orange-100 text-orange-700'}`}>
                                    <span>{t.status || 'Draft'}</span>
                                    {t.status==='Lunas' && t.paymentMethod && <span className="text-[8px] opacity-70 border-t border-green-200 mt-0.5 pt-0.5">{t.paymentMethod}</span>}
                                </div>
                            </td>
                            <td className="p-3 text-center print:hidden">
                                <select 
                                    value={t.progressStatus || 'Baru Masuk'} 
                                    onChange={(e) => onUpdateTransaction({ ...t, progressStatus: e.target.value })}
                                    className={`text-[10px] font-bold border rounded p-1 outline-none cursor-pointer ${t.progressStatus === 'Selesai' || t.progressStatus === 'Diambil' ? 'bg-green-50 text-green-700 border-green-200' : 'bg-gray-50 text-gray-700 border-gray-200'}`}
                                >
                                    <option value="Baru Masuk">Baru Masuk</option>
                                    <option value="Proses Cuci">Proses Cuci</option>
                                    <option value="Proses Setrika">Proses Setrika</option>
                                    <option value="Selesai">Selesai</option>
                                    <option value="Diambil">Diambil</option>
                                </select>
                            </td>
                            <td className="p-3 print:hidden flex gap-2">
                                {t.status==='Belum Lunas' && <button onClick={()=>onLoadToKasir(t)} className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">Bayar</button>}
                                <button onClick={()=>onDeleteTransaction(t.id)} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={16}/></button>
                            </td>
                        </tr>
                        ))}
                    </tbody></table></div>
                    <div className="hidden print:block text-right font-bold text-lg p-2 mt-4">Total Lunas: {formatRupiah(totalOmset)} <br/> Laba Bersih: {formatRupiah(labaBersih)}</div>
                </div>
            );
        }

        function SetupView({ settings, onSaveSettings, compressImage }) {
            const [formData, setFormData] = useState(settings || INITIAL_SETTINGS); const [saved, setSaved] = useState(false);
            useEffect(() => { setFormData(settings || INITIAL_SETTINGS); }, [settings]);
            const handleLogoUpload = async (e) => { if(e.target.files[0]) setFormData({...formData, logo: await compressImage(e.target.files[0])}); };
            const handleSave = (e) => { e.preventDefault(); onSaveSettings(formData); setSaved(true); setTimeout(()=>setSaved(false), 3000); };
            return (
                <div className="max-w-2xl mx-auto space-y-4 animate-in fade-in">
                    <h2 className="text-xl font-bold">Setup Toko</h2>
                    <div className="bg-white rounded-xl shadow-sm border p-6"><form onSubmit={handleSave} className="space-y-4">
                        <div className="flex items-center gap-4 border-b pb-4"><div className="w-16 h-16 bg-blue-50 rounded-full border-2 border-dashed flex items-center justify-center relative overflow-hidden">{formData.logo ? <img src={formData.logo} className="w-full h-full object-cover"/> : <Icon name="ImageIcon" size={24}/>}<input type="file" accept="image/*" onChange={handleLogoUpload} className="absolute inset-0 opacity-0 cursor-pointer"/></div><div><p className="text-sm font-medium">Logo Toko</p><button type="button" onClick={()=>setFormData({...formData, logo:null})} className="text-xs text-red-500">Hapus</button></div></div>
                        <div><label className="text-sm font-medium">Nama Toko</label><input type="text" required value={formData.storeName || ''} onChange={e=>setFormData({...formData, storeName:e.target.value})} className="w-full px-3 py-2 border rounded outline-none"/></div>
                        <div><label className="text-sm font-medium">Alamat</label><textarea required rows="2" value={formData.address || ''} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full px-3 py-2 border rounded outline-none"/></div>
                        <div><label className="text-sm font-medium">No Telp</label><input type="text" required value={formData.phone || ''} onChange={e=>setFormData({...formData, phone:e.target.value})} className="w-full px-3 py-2 border rounded outline-none"/></div>
                        <div className="pt-2">
                            <label className="text-sm font-medium text-gray-700 flex items-center gap-2 mb-1">
                                <Icon name="Printer" size={16} className="text-blue-500" /> Pesan Bawah Struk (Footer)
                            </label>
                            <input type="text" value={formData.receiptFooter || ''} onChange={e=>setFormData({...formData, receiptFooter:e.target.value})} placeholder="Contoh: Terima kasih, sukses selalu!" className="w-full px-3 py-2 border rounded outline-none bg-blue-50/30 focus:bg-white focus:ring-2 focus:ring-blue-500"/>
                            <p className="text-[10px] text-gray-500 mt-1">Pesan ini akan otomatis dicetak di bagian paling bawah struk dan dikirim ke WA.</p>
                        </div>
                        <div className="flex justify-between items-center pt-2 border-t mt-2">{saved?<span className="text-green-600 text-sm font-bold">Tersimpan!</span>:<span></span>}<button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded font-bold">Simpan Info Toko</button></div>
                    </form></div>
                </div>
            );
        }

        function ReceiptModal({ data, settings, onClose, formatRupiah }) {
            const handleWA = () => { if(data.customerPhone) window.open(`https://wa.me/${data.customerPhone.startsWith('0')?'62'+data.customerPhone.slice(1):data.customerPhone}?text=${encodeURIComponent(`Halo *${data.customer || 'Pelanggan'}*,\nPesanan dari *${settings?.storeName || 'Toko'}*:\nNo. Antrian: *${data.queueNumber || '-'}*\nID: *${data.id}*\nTotal: *${formatRupiah(data.total || 0)}*\nPembayaran: *${data.status || '-'} ${data.paymentMethod ? `(${data.paymentMethod})` : ''}*\nProses: *${data.progressStatus || 'Baru Masuk'}*\nAmbil: *${data.pickupDate ? new Date(data.pickupDate).toLocaleDateString('id-ID') : '-'}*\n\n_${settings?.receiptFooter || '*** TERIMA KASIH ***'}_`)}`,'_blank'); };
            const handleBT = async () => { alert("Sambungkan printer dari Bluetooth settings HP lalu klik Cetak PDF jika menggunakan PrintShare/sejenisnya, atau gunakan browser Chrome Android untuk fitur ini."); };
            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4"><div className="bg-white rounded-xl w-full max-w-sm flex flex-col max-h-[85vh]">
                    <div id="receipt-content" className="p-6 overflow-y-auto font-mono text-xs">
                        <div className="text-center mb-4">{settings?.logo&&<img src={settings.logo} className="w-12 h-12 mx-auto mb-1 grayscale" />}<h2 className="font-bold text-sm uppercase">{settings?.storeName || 'Toko Kasir'}</h2><p>{settings?.address || ''}</p><p>{settings?.phone || ''}</p></div>
                        <div className="border-y border-dashed py-2 mb-2 space-y-1">
                            <div className="flex justify-between items-center"><span className="text-sm font-bold bg-gray-100 px-2 py-0.5 rounded">Antrian: {data.queueNumber || '-'}</span><span className="text-[10px] text-gray-500">{data.id}</span></div>
                            <div className="flex justify-between"><span>Tanggal:</span><span>{data.date ? new Date(data.date).toLocaleDateString('id-ID') : '-'}</span></div>
                            <div className="flex justify-between"><span>Nama:</span><span className="font-bold">{data.customer || 'Pelanggan'}</span></div>
                            <div className="flex justify-between"><span>Proses:</span><span className="font-bold">{data.progressStatus || 'Baru Masuk'}</span></div>
                            {data.pickupDate && (
                                <div className="text-center text-[10px] font-bold text-red-500 border-t border-dashed mt-2 pt-1">
                                    Jadwal Ambil: {new Date(data.pickupDate).toLocaleDateString('id-ID')}
                                </div>
                            )}
                        </div>
                        <div className="space-y-1 mb-2">{(data.items || []).map((i,x)=><div key={x}><div className="font-bold">{i.name}</div><div className="flex justify-between text-gray-600"><span>{i.qty} x {formatRupiah(i.price)}</span><span>{formatRupiah(i.price*i.qty)}</span></div></div>)}</div>
                        <div className="border-t border-dashed pt-2 space-y-1">
                            <div className="flex justify-between font-bold text-sm"><span>TOTAL</span><span>{formatRupiah(data.total || 0)}</span></div>
                            <div className="flex justify-between">
                                <span>Status:</span>
                                <span className={`font-bold ${data.status === 'Lunas' ? '' : 'text-red-500'}`}>{data.status || '-'} {data.paymentMethod && data.status === 'Lunas' ? `(${data.paymentMethod})` : ''}</span>
                            </div>
                            {data.status === 'Lunas' && data.amountReceived > 0 && (
                                <>
                                    <div className="flex justify-between text-gray-500"><span>Diterima:</span><span>{formatRupiah(data.amountReceived)}</span></div>
                                    <div className="flex justify-between text-gray-500"><span>Kembali:</span><span>{formatRupiah(data.change || 0)}</span></div>
                                </>
                            )}
                        </div>
                        <div className="text-center mt-6 text-gray-500 whitespace-pre-wrap">{settings?.receiptFooter || '*** TERIMA KASIH ***'}</div>
                    </div>
                    <div className="p-3 bg-gray-50 grid grid-cols-2 gap-2 border-t print:hidden"><button onClick={handleWA} className="py-2 bg-green-500 text-white rounded font-bold text-xs flex items-center justify-center gap-1"><Icon name="MessageCircle" size={14}/> WA</button><button onClick={handleBT} className="py-2 bg-indigo-500 text-white rounded font-bold text-xs flex items-center justify-center gap-1"><Icon name="Bluetooth" size={14}/> BT Print</button><button onClick={()=>window.print()} className="py-2 bg-blue-600 text-white rounded font-bold text-xs flex items-center justify-center gap-1"><Icon name="Printer" size={14}/> Cetak</button><button onClick={onClose} className="py-2 bg-white text-gray-700 rounded border font-bold text-xs">Tutup</button></div>
                </div><style dangerouslySetInnerHTML={{__html: `@media print { body * { visibility: hidden; } #receipt-content, #receipt-content * { visibility: visible; } #receipt-content { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; } }`}} /></div>
            );
        }

        function NavItem({ icon, label, isActive, onClick }) {
            return (<button onClick={onClick} className={`flex flex-col items-center justify-center w-16 transition-colors ${isActive ? 'text-blue-600' : 'text-gray-400'}`}><div className={`${isActive ? 'scale-110 mb-1' : 'scale-100 mb-0'}`}>{icon}</div><span className={`text-[10px] font-medium ${isActive ? 'opacity-100' : 'opacity-0 h-0'}`}>{label}</span></button>);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
